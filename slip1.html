## Q1) Login Form Validation

<!DOCTYPE html>
<html>
<head>
    <title>Login Form Validation</title>

    <script>

        function validateForm() {

            // Get values
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            // Regular Expression for Email
            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // Regular Expression for Password
            // Minimum 8 characters, at least one number and one special character
            let passwordPattern = /^(?=.*[0-9])(?=.*[!@#$%^&*])[A-Za-z0-9!@#$%^&*]{8,}$/;

            // Email Validation
            if (!emailPattern.test(email)) {
                alert("Invalid Email ID");
                return false;
            }

            // Password Validation
            if (!passwordPattern.test(password)) {
                alert("Password must contain minimum 8 characters, one number and one special character");
                return false;
            }

            alert("Login Successful");
            return true;
        }

    </script>
</head>

<body>

    <h2>Login Form</h2>

    <form onsubmit="return validateForm()">

        Email ID:
        <input type="text" id="email">
        <br><br>

        Password:
        <input type="password" id="password">
        <br><br>

        <input type="submit" value="Login">

    </form>

</body>
</html>

## Q2) Student Registration Validation

<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

    <script>

        function validateStudentForm() {

            // Get values
            let fname = document.getElementById("fname").value;
            let lname = document.getElementById("lname").value;
            let age = document.getElementById("age").value;

            // Regular Expression for Alphabets Only
            let namePattern = /^[A-Za-z]+$/;

            // First Name Validation
            if (!namePattern.test(fname)) {
                alert("First name should contain only alphabets");
                return false;
            }

            // Last Name Validation
            if (!namePattern.test(lname)) {
                alert("Last name should contain only alphabets");
                return false;
            }

            // Age Validation
            if (age < 18 || age > 50) {
                alert("Age should be between 18 and 50");
                return false;
            }

            alert("Registration Successful");
            return true;
        }

    </script>
</head>

<body>

    <h2>Student Registration Form</h2>

    <form onsubmit="return validateStudentForm()">

        First Name:
        <input type="text" id="fname">
        <br><br>

        Last Name:
        <input type="text" id="lname">
        <br><br>

        Age:
        <input type="number" id="age">
        <br><br>

        <input type="submit" value="Register">

    </form>

</body>
</html>
