## Q1) SPA using ng-view

```html
<!DOCTYPE html>
<html ng-app="myApp">
<head>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.js"></script>
</head>
<body>

<a href="#/java">Java</a> |
<a href="#/python">Python</a> |
<a href="#/web">Web</a>

<div ng-view></div>

<script>
var app = angular.module('myApp', ['ngRoute']);

app.config(function($routeProvider){
    $routeProvider
    .when('/java', {
        template: '<h2>Java Syllabus</h2>'
    })
    .when('/python', {
        template: '<h2>Python Syllabus</h2>'
    })
    .when('/web', {
        template: '<h2>Full Stack Development Syllabus</h2>'
    });
});
</script>
</body>
</html>
```
